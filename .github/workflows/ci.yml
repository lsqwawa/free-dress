name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: freedress_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freedress_test?schema=public
          JWT_SECRET: ci-test-secret-key-12345678
          JWT_REFRESH_SECRET: ci-test-refresh-secret-12345678
        run: npx jest --passWithNoTests --forceExit --ci

  frontend-check:
    name: Frontend - TypeScript Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FreeDressApp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FreeDressApp/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npx tsc --noEmit
